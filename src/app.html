<!doctype html>
<html lang="id">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		
		<!-- Preconnect to Google Fonts CDN -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

		<!-- Responsive Preload for LCP Hero Background Image -->
		<link rel="preload" href="/image/hero_tari.webp" as="image" media="(min-width: 768px)" fetchpriority="high" />
		<link rel="preload" href="/image/hero_tari_mobile.webp" as="image" media="(max-width: 767px)" fetchpriority="high" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
